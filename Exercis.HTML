<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h2 id="title">Hello World</h2>
  <h2 id="change">WASSSSUP</h2>
  <h2 id="result">0</h2>

    <button onclick="toggleText()">Change Text</button>
    <button onclick="increaseCount()">Add Count</button>
    <button onclick="decrease()">Reduce</button>
    <button onclick="reset()">Reset</button>
    <button onclick="revolution()">Change</button>
  
  <script>

    let title = document.getElementById("title");
    let result = document.getElementById("result");
    let change = document.getElementById("change");
    let num = 0;

function toggleText(){
  if(title.innerHTML === "Hello World"){
    title.innerHTML = "Goodbye World";
  } else {
    title.innerHTML = "Hello World";
  }
  
}

 function increaseCount(){

    num++;
    result.innerHTML = num;

  }

 function decrease(){
    num--;
    result.innerHTML = num;
 }

  function reset(){
    
    num = 0;
    result.innerHTML = num;

  }

  function revolution(){

    change.innerHTML = "MADARA";

  }
    

  </script>

</body>
</html>
