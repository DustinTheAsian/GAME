<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <button ondblclick="roll1()">Rock</button>

  <script>

      function roll1(){

    const shuffle = Math.random();
    let pc = "";

      if(shuffle < 1/3){
        pc = `Rock`;
      }else if(shuffle < 2/3){
        pc = 'paper';
      }else{
        pc = 'scissors';
      }

    
    let result = "";
      
      if(pc === 'Rock'){
          result = 'Tie';
      }else if(pc === 'Paper'){
        result = 'You Lose';
      }else{
        result = 'You Win';
      }


      alert(`pc picked ${pc} and you picked rock ${result}`);
    }
  </script>


</body>
</html>
